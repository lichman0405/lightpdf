name: Build & Release

on:
  push:
    tags:
      - 'v*'           # triggers on  git tag v1.0.0  +  git push --tags
  workflow_dispatch:   # allow manual trigger from Actions tab

jobs:
  build-tauri:
    permissions:
      contents: write  # needed to create/upload GitHub Release assets

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'   # Apple Silicon
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'    # Intel Mac
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux system deps ──────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Rust toolchain ─────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            ${{ matrix.platform == 'macos-latest' &&
                'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdfops-gui/src-tauri -> target

      # ── Node.js / frontend ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        working-directory: pdfops-gui
        run: npm install

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: pdfops-gui
          tagName: ${{ github.ref_name }}
          releaseName: LightPDF ${{ github.ref_name }}
          releaseBody: |
            ## LightPDF ${{ github.ref_name }}

            Download the installer for your platform below.

            | Platform | File |
            |----------|------|
            | Windows  | `.msi` or `.exe` |
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x86_64) |
            | Linux | `.deb` or `.AppImage` |

            > **No Node.js or Rust required** — just download and run the installer.
          releaseDraft: false
          prerelease: false
          updatesExistingRelease: true
          args: ${{ matrix.args }}
